<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LectureLens</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f060;
      --accent-dim: #9eb844;
      --text: #e8e4dc;
      --muted: #6b6b6b;
      --card: #1a1a1a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 100px;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 760px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 56px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 300;
    }

    /* Input area */
    .input-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 6px 6px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      caret-color: var(--accent);
      min-width: 0;
    }

    .input-wrap input::placeholder {
      color: var(--muted);
    }

    .btn {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .btn:hover { background: var(--accent-dim); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: #2a2a2a; color: var(--muted); cursor: not-allowed; transform: none; }

    /* Status / error */
    .status {
      margin-top: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      display: none;
      align-items: center;
      gap: 10px;
    }

    .status.visible { display: flex; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      margin-top: 16px;
      padding: 14px 18px;
      background: #1f1010;
      border: 1px solid #3d1a1a;
      border-radius: 8px;
      font-size: 13px;
      color: #e07070;
      font-family: 'DM Mono', monospace;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* Results */
    #results {
      margin-top: 48px;
      display: none;
      flex-direction: column;
      gap: 36px;
      animation: fadeUp 0.4s ease;
    }
    #results.visible { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Summary bullets */
    .summary-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .summary-list li {
      display: flex;
      gap: 14px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
    }

    .summary-list li::before {
      content: '—';
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* Viva Q&A */
    .viva-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .viva-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .viva-question {
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      user-select: none;
      transition: background 0.15s;
    }

    .viva-question:hover { background: #202020; }

    .viva-question .q-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .viva-question .q-text { flex: 1; }

    .viva-question .chevron {
      flex-shrink: 0;
      color: var(--muted);
      transition: transform 0.25s;
      font-size: 18px;
      line-height: 1;
    }

    .viva-card.open .chevron { transform: rotate(180deg); }

    .viva-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .viva-card.open .viva-answer { max-height: 500px; }

    .viva-answer-inner {
      padding: 0 20px 18px;
      font-size: 14px;
      line-height: 1.75;
      color: #a8a49c;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin: 0 20px;
    }

    /* Footer */
    footer {
      margin-top: 80px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="tag">NLP · Lecture Tool</span>
      <h1>Lecture<em>Lens</em></h1>
      <p class="subtitle">Paste a YouTube lecture link. Get a summary + viva Q&amp;A instantly.</p>
    </header>

    <div class="input-wrap">
      <input id="urlInput" type="text" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
      <button class="btn" id="submitBtn" onclick="handleSubmit()">Summarise →</button>
    </div>

    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="statusText">Fetching transcript...</span>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div id="results">
      <div>
        <div class="section-label">Summary</div>
        <ul class="summary-list" id="summaryList"></ul>
      </div>
      <div>
        <div class="section-label">Viva Questions</div>
        <div class="viva-list" id="vivaList"></div>
      </div>
    </div>

    <footer>LectureLens · Built with YouTube Transcript API + Claude</footer>
  </div>

  <script>
    const statusMessages = [
      "Fetching transcript...",
      "Reading the lecture...",
      "Generating summary & viva...",
    ];

    async function handleSubmit() {
      const url = document.getElementById("urlInput").value.trim();
      const btn = document.getElementById("submitBtn");
      const status = document.getElementById("status");
      const statusText = document.getElementById("statusText");
      const errorMsg = document.getElementById("errorMsg");
      const results = document.getElementById("results");

      if (!url) return;

      // Reset
      errorMsg.classList.remove("visible");
      results.classList.remove("visible");
      btn.disabled = true;
      status.classList.add("visible");

      // Cycle status messages
      let msgIdx = 0;
      statusText.textContent = statusMessages[0];
      const msgInterval = setInterval(() => {
        msgIdx = (msgIdx + 1) % statusMessages.length;
        statusText.textContent = statusMessages[msgIdx];
      }, 3000);

      try {
        const res = await fetch("/api/summarize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || "Something went wrong.");
        }

        renderResults(data);
      } catch (err) {
        errorMsg.textContent = "⚠ " + err.message;
        errorMsg.classList.add("visible");
      } finally {
        clearInterval(msgInterval);
        status.classList.remove("visible");
        btn.disabled = false;
      }
    }

    function renderResults(data) {
      // Summary
      const summaryList = document.getElementById("summaryList");
      summaryList.innerHTML = data.summary
        .map(pt => `<li>${pt}</li>`)
        .join("");

      // Viva
      const vivaList = document.getElementById("vivaList");
      vivaList.innerHTML = data.viva
        .map((item, i) => `
          <div class="viva-card" onclick="toggleCard(this)">
            <div class="viva-question">
              <span class="q-num">Q${String(i + 1).padStart(2, "0")}</span>
              <span class="q-text">${item.question}</span>
              <span class="chevron">⌄</span>
            </div>
            <div class="viva-answer">
              <div class="viva-answer-inner">${item.answer}</div>
            </div>
          </div>
        `).join("");

      document.getElementById("results").classList.add("visible");
    }

    function toggleCard(card) {
      card.classList.toggle("open");
    }

    // Allow Enter key
    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") handleSubmit();
    });
  </script>
</body>
</html>
